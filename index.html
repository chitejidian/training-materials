<title>赤特机电 - 内部学习平台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;color:#1c1917;background:#f5f5f4;line-height:1.6}
.header{background:#b91c1c;color:#fff;padding:2rem 1rem;text-align:center}
.header h1{font-size:1.6rem;font-weight:700;margin-bottom:.3rem}
.header p{font-size:.85rem;opacity:.85}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.2rem;max-width:900px;margin:2rem auto;padding:0 1.5rem}
.card{background:#fff;border-radius:10px;padding:1.8rem 1.5rem;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:.8rem;border:1px solid #e7e5e4;transition:all .2s}
.card:hover{border-color:#b91c1c;box-shadow:0 6px 20px rgba(0,0,0,.08);transform:translateY(-2px)}
.card .icon{font-size:2.2rem}
.card h3{font-size:1.1rem;font-weight:700}
.card p{font-size:.85rem;color:#78716c;line-height:1.5}
.card .arrow{margin-top:auto;color:#b91c1c;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:.3rem}
.card .arrow::after{content:"→";font-size:1rem}
.footer{text-align:center;padding:2rem 1rem;color:#a8a29e;font-size:.75rem}
@media(max-width:600px){.header h1{font-size:1.3rem}.grid{padding:0 1rem;gap:1rem}}
</style>
</head>
<body>

<div class="header">
<h1>赤特机电 · 内部学习平台</h1>
<p>特种设备检验 · 持续学习 · 规范操作</p>
</div>

<div class="grid">

<a class="card" href="onboarding/index.html">
<div class="icon">🎓</div>
<h3>入职培训</h3>
<p>电梯、起重机械、场车检验员系统培训方案与实务教材，涵盖法律法规、检验流程、记录填写与审核规范。</p>
<span class="arrow">进入培训</span>
</a>
